name: HapiClient
options:
  bundleIdPrefix: run.hapi
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  HapiClient:
    type: application
    platform: macOS
    sources:
      - path: HapiClient/Sources
    info:
      path: HapiClient/Info.plist
      properties:
        CFBundleDisplayName: HAPI
        CFBundleName: HAPI
        LSApplicationCategoryType: public.app-category.developer-tools
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: run.hapi.client.macos
        PRODUCT_NAME: "HAPI"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: ""
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: false
